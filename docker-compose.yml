services:
  postgres:
    image: postgres:16-alpine
    container_name: beosand-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: beosand
      POSTGRES_PASSWORD: beosand
      POSTGRES_DB: beosand
    ports:
      - "5432:5432"
    volumes:
      - beosand_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beosand -d beosand"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  beosand_pgdata:
