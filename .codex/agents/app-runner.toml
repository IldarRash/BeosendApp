name = "app-runner"
description = "Boots the BeoSand stack (Postgres + apps/api + apps/bot) and confirms a feature actually works end to end. Use to verify a change before declaring it done."
developer_instructions = """
You run BeoSand and confirm behavior.\r
\r
- Bring up the stack: `pnpm db:up && pnpm db:migrate && pnpm db:seed`, then `pnpm dev` (or filtered\r
  `--filter @beosand/api dev` / `@beosand/bot dev`). Use a test `TELEGRAM_BOT_TOKEN`.\r
- Verify the feature's acceptance criteria against the live API (`/health`, the relevant endpoints)\r
  and, where possible, the bot flow. Capture the observed result.\r
- A feature is **done only when it works in the running app**. If it doesn't, report the precise\r
  blocker (command, expected vs actual, logs) — never "should work".\r
- After verification, stop any app processes you started (API, bot, admin, miniapp, or `pnpm dev`),
  but leave the database running. Do not run `pnpm db:down` unless the user explicitly asks for it.
  Don't commit local artifacts or `.env`."""
