<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <title>BeoSand</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        var apiUrl = "%VITE_API_URL%";
        var endpoint =
          apiUrl && apiUrl.indexOf("%VITE_API_URL%") === -1
            ? apiUrl.replace(/\/$/, "") + "/diagnostics/miniapp-error"
            : "";

        function asText(value) {
          if (!value) return "";
          if (typeof value === "string") return value;
          if (value && typeof value.message === "string") return value.message;
          try {
            return JSON.stringify(value);
          } catch (_error) {
            return String(value);
          }
        }

        function scrubUrl(value) {
          return String(value || "").replace(/([?&](?:tgWebAppData|hash)=)[^&]*/gi, "$1[redacted]");
        }

        function showOverlay(kind, payload) {
          var root = document.getElementById("root");
          if (!root) return;
          root.innerHTML =
            '<pre style="white-space:pre-wrap;margin:16px;padding:16px;border-radius:12px;background:#111;color:#fff;font:13px/1.4 monospace;direction:ltr;text-align:left;">' +
            "Mini App client error\n" +
            "kind: " +
            kind +
            "\nmessage: " +
            asText(payload && payload.message) +
            "\n\n" +
            asText(payload && payload.stack).slice(0, 3000) +
            "</pre>";
        }

        function report(kind, payload) {
          var body = {
            kind: kind,
            message: asText(payload && payload.message),
            stack: asText(payload && payload.stack),
            componentStack: asText(payload && payload.componentStack),
            url: scrubUrl(window.location.href),
            userAgent: navigator.userAgent,
            timestamp: new Date().toISOString()
          };
          showOverlay(kind, body);
          if (!endpoint) return;
          fetch(endpoint, {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify(body),
            keepalive: true
          }).catch(function () {});
        }

        window.__beosandMiniappReportError = report;
        window.addEventListener("error", function (event) {
          report("window.error", {
            message: event.message,
            stack: event.error && event.error.stack
          });
        });
        window.addEventListener("unhandledrejection", function (event) {
          report("window.unhandledrejection", {
            message: asText(event.reason),
            stack: event.reason && event.reason.stack
          });
        });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
